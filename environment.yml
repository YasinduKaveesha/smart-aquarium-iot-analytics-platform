name: aquarium
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # ── Core scientific stack (used by backend pipeline + notebooks) ────────────
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.11
  - scikit-learn=1.7.1   # pinned: model .joblib files were trained on 1.7.1
  - statsmodels>=0.14
  - joblib>=1.3

  # ── Notebook / EDA tooling ──────────────────────────────────────────────────
  - jupyterlab
  - notebook
  - ipykernel
  - matplotlib>=3.8
  - seaborn>=0.13

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  - fastapi>=0.111
  - uvicorn>=0.29
  - pydantic>=2.7
  - pydantic-settings>=2.3
  - python-dotenv>=1.0

  # ── MongoDB drivers ─────────────────────────────────────────────────────────
  - motor>=3.4          # async — used by FastAPI backend
  - pymongo>=4.6        # sync  — used by ardinoDemo/mqtt_to_mongo.py

  # ── MQTT (Arduino bridge) ───────────────────────────────────────────────────
  - paho-mqtt>=2.0

  # ── Misc ────────────────────────────────────────────────────────────────────
  - pip
  - pip:
      # Anything that isn't on conda-forge can go here.
      # (Currently empty — all deps available via conda.)
